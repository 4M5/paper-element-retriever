<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Paper Element Retriever</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --accent: #2f81f7;
      --green: #3fb950;
      --yellow: #d29922;
      --red: #f85149;
      --text: #e6edf3;
      --muted: #8b949e;
      --radius: 8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .brand {
      font-size: 17px;
      font-weight: 700;
      color: var(--accent);
    }

    .brand span {
      color: var(--text);
      font-weight: 400;
    }

    .session-pill {
      font-size: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 12px;
      color: var(--muted);
    }

    .session-pill b {
      color: var(--green);
    }

    .layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      flex: 1;
      overflow: hidden;
    }

    /* sidebar */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sb-block {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .sb-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 8px 14px;
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }

    .btn:hover {
      opacity: .82;
    }

    .btn:disabled {
      opacity: .35;
      cursor: not-allowed;
    }

    .btn-blue {
      background: var(--accent);
      color: #fff;
    }

    .btn-red {
      background: var(--red);
      color: #fff;
    }

    .btn-yellow {
      background: var(--yellow);
      color: #000;
    }

    .btn-ghost {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .gap {
      height: 8px;
    }

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }

    .drop-zone:hover,
    .drop-zone.over {
      border-color: var(--accent);
      background: rgba(47, 129, 247, .05);
    }

    .drop-zone input {
      display: none;
    }

    .drop-zone .icon {
      font-size: 24px;
      margin-bottom: 6px;
    }

    .drop-zone p {
      font-size: 12px;
      color: var(--muted);
    }

    .progress {
      height: 3px;
      background: var(--accent);
      width: 0;
      border-radius: 2px;
      margin-top: 6px;
      transition: width .3s;
    }

    .paper-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .paper-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .paper-item .dot {
      width: 6px;
      height: 6px;
      background: var(--green);
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* eval metrics */
    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
      margin-top: 6px;
    }

    .metric {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px;
      text-align: center;
    }

    .metric .val {
      font-size: 18px;
      font-weight: 700;
    }

    .metric .lbl {
      font-size: 10px;
      color: var(--muted);
      margin-top: 1px;
    }

    .pass {
      color: var(--green);
    }

    .fail {
      color: var(--red);
    }

    .dim {
      color: var(--muted);
    }

    /* chat */
    .chat-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.65;
      animation: pop .18s ease;
    }

    @keyframes pop {
      from {
        opacity: 0;
        transform: translateY(5px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    .msg-user {
      background: var(--accent);
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 2px;
    }

    .msg-bot {
      background: var(--surface);
      border: 1px solid var(--border);
      align-self: flex-start;
      border-bottom-left-radius: 2px;
    }

    .msg-sys {
      align-self: center;
      font-size: 12px;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 12px;
    }

    .citations {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
    }

    .cite-tag {
      display: inline-block;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 7px;
      margin: 2px 3px 2px 0;
      font-size: 11px;
    }

    .answer-images {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .answer-images img {
      max-width: 280px;
      max-height: 200px;
      border-radius: 6px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform .2s;
    }

    .answer-images img:hover {
      transform: scale(1.05);
    }

    .img-label {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
      text-align: center;
    }

    .cite-tag.image-tag {
      background: rgba(47, 129, 247, .12);
      border-color: var(--accent);
      color: var(--accent);
    }

    .typing {
      background: var(--surface);
      border: 1px solid var(--border);
      align-self: flex-start;
      border-bottom-left-radius: 2px;
      padding: 12px 16px;
    }

    .dots span {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--muted);
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.1s infinite;
    }

    .dots span:nth-child(2) {
      animation-delay: .2s
    }

    .dots span:nth-child(3) {
      animation-delay: .4s
    }

    @keyframes bounce {

      0%,
      80%,
      100% {
        transform: scale(1)
      }

      40% {
        transform: scale(1.45)
      }
    }

    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      text-align: center;
      padding: 40px;
    }

    .empty .big {
      font-size: 40px;
      opacity: .3;
    }

    /* input bar */
    .input-bar {
      padding: 14px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      padding: 10px 14px;
      resize: none;
      outline: none;
      transition: border-color .2s;
      max-height: 110px;
    }

    textarea:focus {
      border-color: var(--accent);
    }

    textarea::placeholder {
      color: var(--muted);
    }

    .send {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 17px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity .15s;
    }

    .send:hover {
      opacity: .82;
    }

    ::-webkit-scrollbar {
      width: 4px
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 10px
    }
  </style>
</head>

<body>

  <header>
    <div class="brand">Paper<span> Element Retriever</span></div>
    <div class="session-pill" id="sess-pill">No session</div>
  </header>

  <div class="layout">
    <aside class="sidebar">

      <div class="sb-block">
        <div class="sb-label">Session</div>
        <button class="btn btn-blue" onclick="startSession()">Start Session</button>
        <div class="gap"></div>
        <button class="btn btn-red" id="btn-end" onclick="endSession()" disabled>End &amp; Delete Data</button>
      </div>

      <div class="sb-block">
        <div class="sb-label">Upload Paper</div>
        <div class="drop-zone" id="drop" onclick="document.getElementById('file-in').click()" ondragover="dov(event)"
          ondragleave="dol()" ondrop="ddr(event)">
          <div class="icon">📄</div>
          <p>Click or drag PDF here</p>
          <input type="file" id="file-in" accept=".pdf" onchange="upload(this.files[0])" />
        </div>
        <div class="progress" id="prog"></div>
      </div>

      <div class="sb-block" style="flex:1;overflow-y:auto">
        <div class="sb-label">Uploaded Papers</div>
        <ul class="paper-list" id="paper-list">
          <li style="font-size:12px;color:var(--muted)">None yet</li>
        </ul>
      </div>

      <div class="sb-block">
        <div class="sb-label">Evaluation</div>
        <button class="btn btn-yellow" id="btn-eval" onclick="runEval()" disabled>Run Evaluation</button>
        <div class="metrics" id="metrics" style="display:none"></div>
      </div>

    </aside>

    <main class="chat-panel">
      <div class="messages" id="msgs">
        <div class="empty" id="empty">
          <div class="big">📑</div>
          <p>Start a session, upload the doc,<br>then ask questions about it.</p>
          <p style="font-size:12px;opacity:.6">Answers are grounded in your paper only — with section &amp; page
            citations.</p>
        </div>
      </div>
      <div class="input-bar">
        <textarea id="qinput" rows="1" placeholder="Ask a question about your paper..." onkeydown="onKey(event)"
          oninput="resize(this)"></textarea>
        <button class="send" onclick="sendQuery()">➤</button>
      </div>
    </main>
  </div>

  <script>
    let sid = null;

    async function startSession() {
      const r = await fetch('/session/start', { method: 'POST' });
      const d = await r.json();
      sid = d.session_id;
      document.getElementById('sess-pill').innerHTML = `Session: <b>${sid}</b>`;
      document.getElementById('btn-end').disabled = false;
      document.getElementById('btn-eval').disabled = false;
      sysMsg(`Session started (${sid}). Upload a PDF to begin.`);
      refreshPapers();
    }

    async function endSession() {
      if (!sid || !confirm('End session and delete all data?')) return;
      const fd = new FormData(); fd.append('session_id', sid);
      await fetch('/session/end', { method: 'POST', body: fd });
      sid = null;
      document.getElementById('sess-pill').textContent = 'No session';
      document.getElementById('btn-end').disabled = true;
      document.getElementById('btn-eval').disabled = true;
      document.getElementById('paper-list').innerHTML = '<li style="font-size:12px;color:var(--muted)">None yet</li>';
      document.getElementById('metrics').style.display = 'none';
      sysMsg('Session ended. All data deleted.');
    }

    // upload
    function dov(e) { e.preventDefault(); document.getElementById('drop').classList.add('over'); }
    function dol() { document.getElementById('drop').classList.remove('over'); }
    function ddr(e) { e.preventDefault(); dol(); upload(e.dataTransfer.files[0]); }

    async function upload(file) {
      if (!sid) { alert('Start a session first.'); return; }
      if (!file) return;
      const bar = document.getElementById('prog');
      bar.style.width = '35%';
      sysMsg(`Uploading "${file.name}"... (vision model will analyze images — may take 1-2 min)`);
      const fd = new FormData();
      fd.append('session_id', sid);
      fd.append('file', file);
      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 180000); // 3 min timeout for upload+vision
        const r = await fetch('/upload', { method: 'POST', body: fd, signal: controller.signal });
        clearTimeout(timeout);
        const d = await r.json();
        bar.style.width = '100%';
        setTimeout(() => bar.style.width = '0', 600);
        if (r.ok) {
          let imgNote = d.image_chunks > 0 ? ` + ${d.image_chunks} image descriptions` : '';
          sysMsg(`✓ "${file.name}" — ${d.text_chunks} text chunks${imgNote} across ${d.sections.length} sections (${d.images_found} images found)`);
          refreshPapers();
        } else {
          sysMsg(`✗ Upload failed: ${d.detail}`);
        }
      } catch (e) {
        bar.style.width = '0';
        if (e.name === 'AbortError') {
          sysMsg('✗ Upload timed out (>3 min). The vision model may be too slow.');
        } else {
          sysMsg(`✗ Upload error: ${e.message}`);
        }
      }
    }

    async function refreshPapers() {
      if (!sid) return;
      const r = await fetch(`/papers/${sid}`);
      const d = await r.json();
      const ul = document.getElementById('paper-list');
      if (!d.papers.length) { ul.innerHTML = '<li style="font-size:12px;color:var(--muted)">None yet</li>'; return; }
      ul.innerHTML = d.papers.map(p => `<li class="paper-item"><span class="dot"></span>${p}</li>`).join('');
    }

    // query
    function onKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuery(); } }
    function resize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 110) + 'px'; }

    async function sendQuery() {
      const inp = document.getElementById('qinput');
      const q = inp.value.trim();
      if (!q || !sid) return;
      inp.value = ''; resize(inp);
      hideEmpty();
      userMsg(q);
      const t = typingMsg();
      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 120000); // 2 min timeout
        const r = await fetch('/query', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sid, question: q }),
          signal: controller.signal,
        });
        clearTimeout(timeout);
        const d = await r.json();
        t.remove();
        if (r.ok) {
          botMsg(d.answer, d.citations || [], d.images || []);
        } else {
          sysMsg(`✗ Query failed: ${d.detail || 'Unknown error'}`);
        }
      } catch (e) {
        t.remove();
        if (e.name === 'AbortError') {
          sysMsg('✗ Query timed out (>2 min). The LLM may be slow — try a shorter question.');
        } else {
          sysMsg(`✗ Query error: ${e.message}`);
        }
      }
    }

    // evaluation
    async function runEval() {
      if (!sid) return;
      sysMsg('Running evaluation (may take a few minutes)...');
      document.getElementById('btn-eval').disabled = true;
      const fd = new FormData(); fd.append('session_id', sid); fd.append('n', '10');
      const r = await fetch('/evaluate', { method: 'POST', body: fd });
      const d = await r.json();
      document.getElementById('btn-eval').disabled = false;
      if (r.ok) {
        showMetrics(d.metrics);
        sysMsg(`✓ Evaluation done — ${d.n_test_cases} test cases, avg ${d.avg_latency_sec}s/query`);
      } else {
        sysMsg(`✗ Evaluation failed`);
      }
    }

    const thresholds = { faithfulness: .80, answer_relevancy: .75, context_precision: .70, context_recall: .70, context_relevancy: .70, answer_correctness: .75 };
    const labels = { faithfulness: 'Faithful', answer_relevancy: 'Ans.Rel.', context_precision: 'Ctx.Prec.', context_recall: 'Ctx.Rec.', context_relevancy: 'Ctx.Rel.', answer_correctness: 'Correct' };

    function showMetrics(m) {
      const g = document.getElementById('metrics');
      g.style.display = 'grid';
      g.innerHTML = Object.entries(m).map(([k, v]) => {
        const pass = v >= (thresholds[k] || .70);
        return `<div class="metric"><div class="val ${pass ? 'pass' : 'fail'}">${(v * 100).toFixed(0)}%</div><div class="lbl">${labels[k] || k}</div></div>`;
      }).join('');
    }

    // chat helpers
    function hideEmpty() { const e = document.getElementById('empty'); if (e) e.remove(); }
    function msgs() { return document.getElementById('msgs'); }
    function scroll() { msgs().scrollTop = msgs().scrollHeight; }

    function userMsg(t) {
      const d = document.createElement('div');
      d.className = 'msg msg-user'; d.textContent = t;
      msgs().appendChild(d); scroll();
    }

    function botMsg(text, citations, images) {
      const d = document.createElement('div');
      d.className = 'msg msg-bot';
      d.innerHTML = `<div>${esc(text)}</div>`;
      if (citations && citations.length) {
        const c = document.createElement('div');
        c.className = 'citations';
        c.innerHTML = '📎 ' + citations.map(ci => {
          const cls = ci.type === 'image' ? 'cite-tag image-tag' : 'cite-tag';
          const icon = ci.type === 'image' ? '🖼️' : '';
          return `<span class="${cls}">${icon}${ci.filename} › ${ci.section} · p${ci.pages}</span>`;
        }).join('');
        d.appendChild(c);
      }
      if (images && images.length) {
        const ig = document.createElement('div');
        ig.className = 'answer-images';
        images.forEach(img => {
          const wrap = document.createElement('div');
          const imgEl = document.createElement('img');
          imgEl.src = '/' + img.image_path;
          imgEl.alt = `Figure from page ${img.page}`;
          imgEl.title = `Figure from page ${img.page} — click to enlarge`;
          imgEl.onclick = () => window.open(imgEl.src, '_blank');
          const lbl = document.createElement('div');
          lbl.className = 'img-label';
          lbl.textContent = `Page ${img.page}`;
          wrap.appendChild(imgEl);
          wrap.appendChild(lbl);
          ig.appendChild(wrap);
        });
        d.appendChild(ig);
      }
      msgs().appendChild(d); scroll();
    }

    function sysMsg(t) {
      const d = document.createElement('div');
      d.className = 'msg-sys'; d.textContent = t;
      msgs().appendChild(d); scroll();
    }

    function typingMsg() {
      const d = document.createElement('div');
      d.className = 'typing';
      d.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
      msgs().appendChild(d); scroll();
      return d;
    }

    function esc(t) {
      return t.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
    }
  </script>
</body>

</html>
